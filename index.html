<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이든 카카오톡 메시지 발송</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; background: #f5f5f0; color: #1a1a1a; font-size: 14px; }
  .app { display: flex; height: 100vh; overflow: hidden; }

  .sidebar { width: 200px; background: #fff; border-right: 1px solid #e5e5e0; display: flex; flex-direction: column; flex-shrink: 0; }
  .sidebar-header { padding: 14px 12px 10px; border-bottom: 1px solid #e5e5e0; }
  .sidebar-header h2 { font-size: 12px; font-weight: 700; color: #555; letter-spacing: 0.5px; margin-bottom: 6px; }
  .sidebar-top-row { display: flex; gap: 4px; align-items: center; }
  .search-wrap { position: relative; flex: 1; }
  .search-wrap input { width: 100%; padding: 5px 8px 5px 24px; border: 1px solid #e0e0db; border-radius: 6px; font-size: 12px; background: #f8f8f5; color: #1a1a1a; outline: none; }
  .search-wrap input:focus { border-color: #FEE500; background: #fff; }
  .search-wrap::before { content: '🔍'; position: absolute; left: 6px; top: 50%; transform: translateY(-50%); font-size: 10px; }
  .btn-refresh { padding: 5px 7px; border: 1px solid #e0e0db; border-radius: 6px; background: #f8f8f5; font-size: 12px; cursor: pointer; color: #666; transition: all 0.15s; flex-shrink: 0; }
  .btn-refresh:hover { background: #FEE500; border-color: #FFC107; }
  .student-list { overflow-y: auto; flex: 1; padding: 6px 0; }
  .student-group-label { font-size: 10px; font-weight: 700; color: #bbb; padding: 8px 12px 3px; letter-spacing: 0.5px; }
  .student-item { display: flex; align-items: center; gap: 7px; padding: 7px 12px; cursor: pointer; border-left: 3px solid transparent; transition: background 0.1s; }
  .student-item:hover { background: #fafaf7; }
  .student-item.active { background: #FFFDE7; border-left-color: #FEE500; }
  .student-avatar { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
  .student-name { font-size: 13px; font-weight: 500; }
  .student-grade { font-size: 10px; color: #999; }
  .sync-status { font-size: 10px; color: #bbb; padding: 6px 12px; text-align: center; }

  .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
  .main-header { background: #fff; border-bottom: 1px solid #e5e5e0; padding: 12px 18px; display: flex; align-items: center; gap: 10px; min-height: 56px; }
  .sel-avatar { width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; flex-shrink: 0; }
  .sel-info h1 { font-size: 15px; font-weight: 600; }
  .sel-info p { font-size: 11px; color: #888; margin-top: 1px; }
  .content { flex: 1; overflow-y: auto; padding: 14px 18px; }

  .category-tabs { display: flex; gap: 5px; margin-bottom: 14px; flex-wrap: wrap; }
  .cat-tab { padding: 5px 11px; border-radius: 20px; border: 1px solid #e0e0db; background: #fff; font-size: 12px; font-weight: 500; cursor: pointer; color: #666; transition: all 0.15s; white-space: nowrap; }
  .cat-tab:hover { border-color: #FEE500; }
  .cat-tab.active { background: #FEE500; border-color: #FEE500; color: #1a1a1a; font-weight: 700; }

  .message-options { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .msg-card { background: #fff; border: 1px solid #e5e5e0; border-radius: 10px; padding: 11px 13px; cursor: pointer; transition: all 0.15s; }
  .msg-card:hover { border-color: #FEE500; background: #FFFDE7; }
  .msg-card.selected { border-color: #FFC107; background: #FFF8E1; box-shadow: 0 0 0 2px #FEE50040; }
  .msg-card-icon { font-size: 17px; margin-bottom: 3px; }
  .msg-card-title { font-size: 13px; font-weight: 600; margin-bottom: 2px; }
  .msg-card-desc { font-size: 11px; color: #888; line-height: 1.4; }

  .daily-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
  .daily-card { background: #fff; border: 1px solid #e5e5e0; border-radius: 10px; padding: 10px 12px; cursor: pointer; transition: all 0.15s; display: flex; align-items: flex-start; gap: 8px; }
  .daily-card:hover { border-color: #FEE500; background: #FFFDE7; }
  .daily-card.checked { border-color: #FFC107; background: #FFF8E1; box-shadow: 0 0 0 2px #FEE50040; }
  .daily-checkbox { width: 17px; height: 17px; border: 2px solid #ddd; border-radius: 4px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; font-size: 10px; transition: all 0.15s; }
  .daily-card.checked .daily-checkbox { background: #FEE500; border-color: #FFC107; color: #1a1a1a; }
  .daily-card-title { font-size: 13px; font-weight: 600; margin-bottom: 1px; }
  .daily-card-desc { font-size: 11px; color: #888; }

  .extra-inputs { background: #fff; border: 1px solid #e5e5e0; border-radius: 10px; padding: 13px; margin-top: 10px; }
  .extra-inputs h3 { font-size: 11px; font-weight: 700; color: #999; margin-bottom: 10px; letter-spacing: 0.5px; text-transform: uppercase; }
  .input-row { display: flex; align-items: center; gap: 7px; margin-bottom: 7px; }
  .input-row:last-child { margin-bottom: 0; }
  .input-row label { font-size: 12px; color: #555; min-width: 80px; flex-shrink: 0; }
  .input-row input, .input-row select { flex: 1; padding: 6px 9px; border: 1px solid #e0e0db; border-radius: 6px; font-size: 13px; color: #1a1a1a; background: #f8f8f5; outline: none; min-width: 0; }
  .input-row input:focus, .input-row select:focus { border-color: #FEE500; background: #fff; }

  .time-row { display: flex; align-items: center; gap: 5px; flex: 1; }
  .ampm-btn { padding: 5px 9px; border: 1px solid #e0e0db; border-radius: 6px; background: #f8f8f5; font-size: 12px; font-weight: 500; cursor: pointer; color: #666; transition: all 0.15s; }
  .ampm-btn.active { background: #FEE500; border-color: #FFC107; color: #1a1a1a; font-weight: 700; }
  .time-input { padding: 6px 9px; border: 1px solid #e0e0db; border-radius: 6px; font-size: 13px; color: #1a1a1a; background: #f8f8f5; outline: none; width: 68px; }
  .time-input:focus { border-color: #FEE500; background: #fff; }

  .status-row { display: flex; align-items: flex-start; gap: 7px; margin-bottom: 7px; }
  .status-row label { font-size: 12px; color: #555; min-width: 80px; flex-shrink: 0; padding-top: 4px; }
  .status-btns { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
  .status-btn { padding: 4px 9px; border: 1px solid #e0e0db; border-radius: 14px; background: #f8f8f5; font-size: 11px; cursor: pointer; color: #666; transition: all 0.15s; white-space: nowrap; }
  .status-btn:hover { border-color: #FEE500; }
  .status-btn.active { background: #FEE500; border-color: #FFC107; color: #1a1a1a; font-weight: 600; }

  .hw-items { display: flex; flex-wrap: wrap; gap: 5px; flex: 1; }
  .hw-chip { padding: 4px 9px; border: 1px solid #e0e0db; border-radius: 14px; background: #f8f8f5; font-size: 11px; cursor: pointer; color: #666; transition: all 0.15s; white-space: nowrap; }
  .hw-chip:hover { border-color: #FEE500; }
  .hw-chip.active { background: #FEE500; border-color: #FFC107; color: #1a1a1a; font-weight: 600; }

  .daily-status-block { margin-bottom: 12px; padding-bottom: 12px; border-bottom: 1px solid #f0f0eb; }
  .daily-status-block:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }
  .daily-status-label { font-size: 12px; font-weight: 600; color: #444; margin-bottom: 5px; }

  /* 미리보기 */
  .preview-section { margin-top: 12px; }
  .preview-label { font-size: 11px; font-weight: 700; color: #999; letter-spacing: 0.5px; margin-bottom: 6px; text-transform: uppercase; }
  .preview-bubble { background: #FEE500; border-radius: 12px 12px 12px 4px; padding: 12px 14px; font-size: 13px; line-height: 1.75; color: #1a1a1a; white-space: pre-wrap; word-break: break-all; }
  .preview-time { font-size: 11px; color: #aaa; margin-top: 4px; }

  /* 액션바 — 복사 중심으로 단순화 */
  .action-bar { background: #fff; border-top: 1px solid #e5e5e0; padding: 11px 18px; display: flex; gap: 8px; }
  .btn-main-copy { flex: 1; padding: 11px; border: none; border-radius: 8px; background: #FEE500; font-size: 14px; font-weight: 700; cursor: pointer; color: #1a1a1a; transition: all 0.15s; }
  .btn-main-copy:hover { background: #FFD600; }
  .btn-main-copy:active { transform: scale(0.98); }
  .btn-main-copy.copied { background: #4CAF50; color: #fff; }

  .history-panel { width: 220px; background: #fff; border-left: 1px solid #e5e5e0; display: flex; flex-direction: column; flex-shrink: 0; }
  .history-header { padding: 12px 12px 8px; border-bottom: 1px solid #e5e5e0; font-size: 11px; font-weight: 700; color: #999; letter-spacing: 0.5px; display: flex; justify-content: space-between; align-items: center; }
  .history-clear { font-size: 11px; color: #ccc; cursor: pointer; font-weight: 400; }
  .history-clear:hover { color: #888; }
  .history-list { overflow-y: auto; flex: 1; }
  .history-item { padding: 9px 12px; border-bottom: 1px solid #f5f5f0; cursor: pointer; }
  .history-item:hover { background: #fafaf7; }
  .history-student { font-size: 12px; font-weight: 600; color: #333; }
  .history-msg { font-size: 11px; color: #999; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .history-ts { font-size: 10px; color: #ccc; margin-top: 2px; }
  .history-recopy { font-size: 10px; color: #FFC107; margin-top: 2px; }

  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #ccc; text-align: center; gap: 8px; padding: 20px; }
  .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(16px); background: #222; color: #fff; padding: 9px 18px; border-radius: 20px; font-size: 13px; opacity: 0; transition: all 0.22s; pointer-events: none; z-index: 9999; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* 텍스트 선택용 숨김 textarea */
  #copyTA { position: fixed; top: -9999px; left: -9999px; opacity: 0; width: 1px; height: 1px; }

  @media (max-width: 900px) { .history-panel { display: none; } }
  @media (max-width: 620px) { .sidebar { width: 160px; } .message-options, .daily-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<textarea id="copyTA" readonly></textarea>
<div class="app">

  <!-- 사이드바 -->
  <div class="sidebar">
    <div class="sidebar-header">
      <h2>학생 명단</h2>
      <div class="sidebar-top-row">
        <div class="search-wrap">
          <input type="text" id="searchInput" placeholder="이름 검색" oninput="filterStudents()">
        </div>
        <button class="btn-refresh" onclick="loadStudents()" title="명단 새로고침">↻</button>
      </div>
    </div>
    <div class="student-list" id="studentList"><div class="empty-state"><p style="font-size:12px;">불러오는 중...</p></div></div>
    <div class="sync-status" id="syncStatus"></div>
  </div>

  <!-- 메인 -->
  <div class="main">
    <div class="main-header" id="mainHeader">
      <div style="display:flex;align-items:center;gap:10px;color:#bbb;">
        <span style="font-size:20px;">👈</span>
        <span style="font-size:13px;">학생을 선택하세요</span>
      </div>
    </div>
    <div class="content" id="mainContent">
      <div class="empty-state"><div style="font-size:36px;">💬</div><p>학생을 선택하면<br>메시지를 작성할 수 있어요</p></div>
    </div>
    <div class="action-bar" id="actionBar" style="display:none;">
      <button class="btn-main-copy" id="copyBtn" onclick="doCopy()">📋 메시지 복사하기</button>
    </div>
  </div>

  <!-- 히스토리 -->
  <div class="history-panel">
    <div class="history-header">발송 내역 <span class="history-clear" onclick="clearHistory()">지우기</span></div>
    <div class="history-list" id="historyList"><div class="empty-state"><p style="font-size:11px;">내역 없음</p></div></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
// ─────────────────────────────────────────────────────────
// 설정
// ─────────────────────────────────────────────────────────
const SHEET_ID = '1eMuRElyG0agV5JRNbjFoSpzjX7ZICPMznXP69BOer2Y';
const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

const COLORS = ['#FF6B6B','#4ECDC4','#45B7D1','#96CEB4','#DDA0DD','#82E0AA','#F0B27A','#AED6F1','#D2B4DE','#F7DC6F'];
const GRADE_ORDER = ['N수','고3','고2','고1','중3'];

// ─────────────────────────────────────────────────────────
// 학생 데이터 (Google Sheets에서 로드)
// ─────────────────────────────────────────────────────────
let STUDENTS = [];
let filteredStudents = [];

async function loadStudents() {
  document.getElementById('syncStatus').textContent = '동기화 중...';
  document.getElementById('studentList').innerHTML = '<div class="empty-state"><p style="font-size:12px;">불러오는 중...</p></div>';
  try {
    const res = await fetch(SHEET_CSV_URL);
    if (!res.ok) throw new Error('fetch fail');
    const csv = await res.text();
    const rows = csv.trim().split('\n').map(r => r.split(',').map(c => c.replace(/^"|"$/g,'').trim()));
    // 헤더(이름/비번) 제외, 빈 행 제외
    STUDENTS = rows.slice(1).filter(r => r[0] && r[0] !== '이름').map(r => ({
      name: r[0], grade: r[1] || ''
    }));
    filteredStudents = [...STUDENTS];
    document.getElementById('syncStatus').textContent = `${STUDENTS.length}명 · 방금 동기화`;
    renderStudents(filteredStudents);
  } catch(e) {
    // 공개 설정 안 된 경우 → 하드코딩 fallback
    STUDENTS = FALLBACK_STUDENTS;
    filteredStudents = [...STUDENTS];
    document.getElementById('syncStatus').textContent = `오프라인 데이터 (${STUDENTS.length}명)`;
    renderStudents(filteredStudents);
  }
}

// 시트 공개 전 임시 fallback (시트에서 읽은 명단)
const FALLBACK_STUDENTS = [
  {name:'김유성', grade:'고2'}, {name:'김지우', grade:'N수'},
  {name:'박민균', grade:'N수'}, {name:'박주혁', grade:'N수'},
  {name:'박준혁', grade:'중3'}, {name:'박준혁(H)', grade:'고1'},
  {name:'백승효', grade:'고3'}, {name:'손은지', grade:'N수'},
  {name:'손지예', grade:'고3'}, {name:'손태영', grade:'고3'},
  {name:'이서윤', grade:'고3'}, {name:'이성현', grade:'N수'},
  {name:'이수연', grade:'N수'}, {name:'이승찬', grade:'고3'},
  {name:'이윤재', grade:'고3'}, {name:'이재훈', grade:'N수'},
  {name:'장은서', grade:'N수'}, {name:'전혜리', grade:'N수'},
  {name:'조승훈', grade:'고3'}, {name:'최수정', grade:'고3'},
  {name:'황혜암', grade:'고3'}, {name:'정가온', grade:'고3'},
  {name:'임도윤', grade:'고3'}, {name:'김진우', grade:'고3'},
  {name:'장다연', grade:'고1'}, {name:'최은호', grade:'고3'},
];

function filterStudents() {
  const q = document.getElementById('searchInput').value.trim();
  filteredStudents = q ? STUDENTS.filter(s=>s.name.includes(q)) : [...STUDENTS];
  renderStudents(filteredStudents);
}

function getColor(name) {
  let h=0; for(let c of name) h=(h*31+c.charCodeAt(0))%COLORS.length; return COLORS[h];
}

function renderStudents(list) {
  const el = document.getElementById('studentList');
  if (!list.length) { el.innerHTML='<div class="empty-state"><p style="font-size:12px;">검색 결과 없음</p></div>'; return; }
  const grps = {};
  list.forEach(s=>{ const g=s.grade||'기타'; if(!grps[g]) grps[g]=[]; grps[g].push(s); });
  el.innerHTML = GRADE_ORDER.filter(g=>grps[g]).concat(Object.keys(grps).filter(g=>!GRADE_ORDER.includes(g))).map(g=>`
    <div class="student-group-label">${g}</div>
    ${grps[g].map(s=>`
      <div class="student-item ${selectedStudent?.name===s.name?'active':''}" onclick="selectStudent('${s.name}')">
        <div class="student-avatar" style="background:${getColor(s.name)}22;color:${getColor(s.name)}">${s.name[0]}</div>
        <div><div class="student-name">${s.name}</div><div class="student-grade">${s.grade}</div></div>
      </div>`).join('')}
  `).join('');
}

// ─────────────────────────────────────────────────────────
// 상태
// ─────────────────────────────────────────────────────────
let selectedStudent = null;
let selectedCategory = 'attendance';
let selectedMsgId = null;
let ampm = (new Date().getHours() < 12) ? '오전' : '오후';
let timeVal = '';
let earlyReason = '';
let earlyReasonCustom = '';
let dailyChecked = {};
let hwChecked = {};
let hwExtra = '';
let extraMap = {};
let historyLog = [];

function selectStudent(name) {
  selectedStudent = STUDENTS.find(s=>s.name===name) || {name, grade:''};
  selectedMsgId=null; dailyChecked={}; hwChecked={}; hwExtra=''; extraMap={}; earlyReason=''; earlyReasonCustom=''; timeVal=''; initAmpm();
  renderStudents(filteredStudents);
  renderMain();
}

// ─────────────────────────────────────────────────────────
// 카테고리 & 메시지 정의
// ─────────────────────────────────────────────────────────
const CATEGORIES = [
  {id:'attendance', label:'📋 출결'},
  {id:'daily',      label:'📒 일일 학습'},
  {id:'attitude',   label:'🎯 학습 태도'},
  {id:'homework',   label:'📝 과제'},
  {id:'consult',    label:'💬 상담'},
  {id:'notice',     label:'📢 공지'},
];
const ATTENDANCE_MSGS = [
  {id:'not_arrived',    icon:'⚠️', title:'미등원 알림',       desc:'예정 시간 초과 미등원'},
  {id:'holiday_sunday',  icon:'🌟', title:'일요일 등원 안내',  desc:'일요일 자율 등원 공지'},
  {id:'holiday_public',  icon:'🎌', title:'공휴일 등원 안내',  desc:'공휴일 자율 등원 공지'},
  {id:'no_return',      icon:'🚶', title:'외출 후 미복귀',      desc:'현재 시각 기준 미복귀'},
  {id:'break_no_return',icon:'⏰', title:'쉬는 시간 후 미복귀', desc:'쉬는 시간 종료 후 입실 촉구'},
  {id:'meal_no_return', icon:'🍽️', title:'식사 후 미복귀',      desc:'식사 시간 종료 후 입실 촉구'},
  {id:'early_leave',    icon:'🏃', title:'조기 퇴원',           desc:'사유 선택 포함'},
  {id:'arrived',     icon:'✅', title:'정상 등원',     desc:'등원 시각 안내'},
  {id:'leaved',      icon:'🌙', title:'정상 퇴원',     desc:'퇴원 시각 안내'},
  {id:'absent',      icon:'❌', title:'무단 결석',     desc:'사전 연락 없이 미등원'},
];
const ATTITUDE_MSGS = [
  {id:'att_excellent', icon:'⭐', title:'집중도 우수',    desc:'오늘 최고 학습 태도'},
  {id:'att_normal',    icon:'👍', title:'집중도 보통',    desc:'무난한 학습 태도'},
  {id:'att_low',       icon:'⚠️', title:'집중도 저조',    desc:'사유 입력'},
  {id:'att_sleep',     icon:'😴', title:'수면 부족·졸음', desc:'졸음 관찰됨'},
  {id:'att_bad',       icon:'❌', title:'학습 태도 불량', desc:'전반적 태도 문제'},
];
const HOMEWORK_MSGS = [
  {id:'hw_incomplete', icon:'📝', title:'과제 미완료',     desc:'항목 복수 선택'},
  {id:'hw_accumulate', icon:'⚠️', title:'누적 과제 미완료', desc:'누적 미완료 항목 선택'},
  {id:'hw_complete',   icon:'✅', title:'과제 완료 우수',  desc:'오늘 모두 완료'},
];
const CONSULT_MSGS = [
  {id:'c_study',  icon:'📚', title:'학습 상담 요청',   desc:'학습 관련 상담'},
  {id:'c_score',  icon:'📊', title:'성적 관련 면담',   desc:'성적 이슈 상담'},

function renderMain() {
  if (!selectedStudent) return;
  const s = selectedStudent;
  document.getElementById('mainHeader').innerHTML = `
    <div class="sel-avatar" style="background:${getColor(s.name)}22;color:${getColor(s.name)}">${s.name[0]}</div>
    <div class="sel-info"><h1>${s.name}</h1><p>${s.grade}</p></div>`;

  let html = `<div class="category-tabs">${CATEGORIES.map(c=>`
    <div class="cat-tab ${selectedCategory===c.id?'active':''}" onclick="selectCat('${c.id}')">${c.label}</div>`).join('')}
  </div>`;

  const msgLists = {attendance:ATTENDANCE_MSGS, attitude:ATTITUDE_MSGS, homework:HOMEWORK_MSGS, consult:CONSULT_MSGS, notice:NOTICE_MSGS};
  if (selectedCategory === 'daily') {
    html += `<div style="font-size:11px;color:#aaa;margin-bottom:8px;">여러 항목을 동시에 선택해 한 번에 보낼 수 있어요</div>
      <div class="daily-grid">${DAILY_ITEMS.map(d=>`
        <div class="daily-card ${dailyChecked[d.key]?'checked':''}" onclick="toggleDaily('${d.key}')">
          <div class="daily-checkbox">${dailyChecked[d.key]?'✓':''}</div>
          <div><div class="daily-card-title">${d.icon} ${d.title}</div><div class="daily-card-desc">${d.desc}</div></div>
        </div>`).join('')}
      </div>`;
  } else {
    const list = msgLists[selectedCategory] || [];
    html += `<div class="message-options">${list.map(m=>`
      <div class="msg-card ${selectedMsgId===m.id?'selected':''}" onclick="selectMsg('${m.id}')">
        <div class="msg-card-icon">${m.icon}</div>
        <div class="msg-card-title">${m.title}</div>
        <div class="msg-card-desc">${m.desc}</div>
      </div>`).join('')}</div>`;
  }

  html += `<div id="extraSection"></div><div id="previewSection"></div>`;
  document.getElementById('mainContent').innerHTML = html;
  renderExtras();
  renderPreview();
}

function selectCat(cat) {
  selectedCategory=cat; selectedMsgId=null; dailyChecked={}; hwChecked={}; hwExtra=''; extraMap={}; earlyReason=''; earlyReasonCustom=''; timeVal='';
  renderMain();
}
function selectMsg(id) {
  selectedMsgId=id; extraMap={}; earlyReason=''; earlyReasonCustom=''; timeVal='';
  renderMain();
}
function toggleDaily(key) {
  if(dailyChecked[key]) delete dailyChecked[key];
  else dailyChecked[key]={status:'',num:''};
  selectedMsgId = Object.keys(dailyChecked).length ? 'daily_multi' : null;
  renderMain();
}

function renderExtras() {
  const el = document.getElementById('extraSection');
  if (!el) return;
  const id = selectedMsgId;
  if (!id) { el.innerHTML=''; return; }

  function timeBlock(label) {
    const ph = nowHHMM();
    return `<div class="input-row"><label>${label}</label>
      <div class="time-row">
        <button class="ampm-btn ${ampm==='오전'?'active':''}" onclick="setAmpm('오전')">오전</button>
        <button class="ampm-btn ${ampm==='오후'?'active':''}" onclick="setAmpm('오후')">오후</button>
        <input class="time-input" type="text" placeholder="${ph}" value="${timeVal}" oninput="timeVal=this.value;renderPreview()">
      </div></div>`;
  }

  let html = '';
  if (id==='not_arrived')    html=`<div class="extra-inputs"><h3>추가 정보</h3>${timeBlock('현재 시각')}</div>`;
  else if (id==='no_return') html=`<div class="extra-inputs"><h3>추가 정보</h3>${timeBlock('현재 시각')}</div>`;
  else if (id==='break_no_return') html=`<div class="extra-inputs"><h3>추가 정보</h3>${timeBlock('쉬는 시간 종료')}</div>`;
  else if (id==='meal_no_return')  html=`<div class="extra-inputs"><h3>추가 정보</h3>${timeBlock('식사 시간 종료')}</div>`;
  else if (id==='early_leave') {
    html=`<div class="extra-inputs"><h3>추가 정보</h3>${timeBlock('퇴원 시각')}
      <div class="status-row"><label>퇴원 사유</label>
        <div class="status-btns">${EARLY_REASONS.map(r=>`<span class="status-btn ${earlyReason===r?'active':''}" onclick="setEarlyReason('${r}')">${r}</span>`).join('')}</div>
      </div>
      ${earlyReason==='기타'?`<div class="input-row"><label>직접 입력</label><input type="text" placeholder="사유를 입력하세요" value="${earlyReasonCustom}" oninput="earlyReasonCustom=this.value;renderPreview()"></div>`:''}
    </div>`;
  }
  else if (id==='arrived') html=`<div class="extra-inputs"><h3>추가 정보</h3>${timeBlock('등원 시각')}</div>`;
  else if (id==='leaved') html=`<div class="extra-inputs"><h3>추가 정보</h3>${timeBlock('퇴원 시각')}</div>`;
  else if (id==='daily_multi') {
    const keys=Object.keys(dailyChecked);
    if(keys.length) {
      html=`<div class="extra-inputs"><h3>선택 항목 상태 입력</h3>`;
      keys.forEach(k=>{
        const d=DAILY_ITEMS.find(x=>x.key===k); if(!d) return;
        const cur=dailyChecked[k]||{};
        html+=`<div class="daily-status-block">
          <div class="daily-status-label">${d.icon} ${d.title}</div>
          <div class="status-btns" style="margin-bottom:${d.hasNum?'5px':'0'}">${d.opts.map(o=>`
            <span class="status-btn ${cur.status===o?'active':''}" onclick="setDailyStatus('${k}','${o}')">${o}</span>`).join('')}
          </div>
          ${d.hasNum?`<div class="input-row" style="margin-top:4px"><label style="min-width:60px">강수</label>
            <input type="number" min="0" max="99" placeholder="0" value="${cur.num||''}" oninput="setDailyNum('${k}',this.value)" style="max-width:60px">
            <span style="font-size:12px;color:#888">강</span></div>`:''}
        </div>`;
      });
      html+=`</div>`;
    }
  }
  else if (id==='att_low') html=`<div class="extra-inputs"><h3>추가 정보</h3>
    <div class="input-row"><label>집중 저하 사유</label><input type="text" placeholder="예) 스마트폰 사용, 잡담" value="${extraMap['att_reason']||''}" oninput="setExtra('att_reason',this.value)"></div>
    </div>`;
  else if (id==='hw_incomplete'||id==='hw_accumulate') {
    html=`<div class="extra-inputs"><h3>${id==='hw_accumulate'?'누적 미완료':'미완료'} 항목 선택</h3>

        <div class="hw-items">${HW_ITEMS.map(it=>`<span class="hw-chip ${hwChecked[it]?'active':''}" onclick="toggleHw('${it}')">${it}</span>`).join('')}</div>

    </div>`;

  else if (id==='n_closed') html=`<div class="extra-inputs"><h3>추가 정보</h3>
    <div class="input-row"><label>휴원 일자</label><input type="text" placeholder="예) 7월 5일(금)" value="${extraMap['n_date']||''}" oninput="setExtra('n_date',this.value)"></div></div>`;
  else if (id==='n_change') html=`<div class="extra-inputs"><h3>추가 정보</h3>
    <div class="input-row"><label>변경 내용</label><input type="text" placeholder="예) 7/10 수업이 7/11로 변경" value="${extraMap['n_change']||''}" oninput="setExtra('n_change',this.value)"></div></div>`;
  else if (id==='n_fee') html=`<div class="extra-inputs"><h3>추가 정보</h3>
    <div class="input-row"><label>납부 월</label><input type="text" placeholder="예) 7월" value="${extraMap['fee_month']||''}" oninput="setExtra('fee_month',this.value)" style="max-width:80px"></div>
    <div class="input-row"><label>납부 기한</label><input type="text" placeholder="예) 7월 10일" value="${extraMap['fee_due']||''}" oninput="setExtra('fee_due',this.value)"></div></div>`;
  else if (id==='n_summer') html=`<div class="extra-inputs"><h3>추가 정보</h3>
    <div class="input-row"><label>프로그램 기간</label><input type="text" placeholder="예) 7월 28일 ~ 8월 22일" value="${extraMap['summer_period']||''}" oninput="setExtra('summer_period',this.value)"></div></div>`;

  el.innerHTML=html;
  renderPreview();
}

function setAmpm(v){ampm=v;renderExtras();}
function setEarlyReason(r){earlyReason=r;renderExtras();}
function setDailyStatus(k,v){if(!dailyChecked[k])dailyChecked[k]={};dailyChecked[k].status=v;renderExtras();}
function setDailyNum(k,v){if(!dailyChecked[k])dailyChecked[k]={};dailyChecked[k].num=v;renderPreview();}
function setExtra(k,v){extraMap[k]=v;renderPreview();}
function toggleHw(it){hwChecked[it]=!hwChecked[it];renderExtras();}

function nowHHMM(){
  const d=new Date(); const h=d.getHours()%12||12; const m=String(d.getMinutes()).padStart(2,'0');
  return `${h}:${m}`;
}
function initAmpm(){
  // 페이지 로드 및 학생 선택 시에만 현재 시간으로 초기화
  ampm = (new Date().getHours() < 12) ? '오전' : '오후';
}
function fullTime(){return `${ampm} ${timeVal||nowHHMM()}`;}

    n_change:    `안녕하세요, 이든관리형학습센터입니다.\n\n일정 변경 안내드립니다.\n${extraMap['n_change']||'______'}\n\n- 이든관리형학습센터 -`,
    n_fee:       `안녕하세요, 이든관리형학습센터입니다.\n\n${extraMap['fee_month']||'______'} 수강료 납부 기간(~${extraMap['fee_due']||'______'})이 다가왔습니다. 아직 미납 시 납부 부탁드립니다.\n\n- 이든관리형학습센터 -`,
    n_summer:    `안녕하세요, 이든관리형학습센터입니다.\n\n이든 썸머스쿨 2026이 곧 시작됩니다! 🌞\n\n📌 기간: ${extraMap['summer_period']||'______'}\n📌 대상: 고1·고2·고3\n\n\n자세한 내용은 안내문을 보내드리겠습니다.\n- 이든관리형학습센터 -`,
  };

  if (selectedMsgId==='early_leave') {
    const reason=earlyReason==='기타'?(earlyReasonCustom||'기타 사유'):(earlyReason||'______');
    return `안녕하세요, 이든관리형학습센터입니다.\n\n[${n}] 학생이 ${t}에 조기 퇴원했습니다.\n사유: ${reason}`;
  }
  if (selectedMsgId==='att_low') {
    return `안녕하세요, 이든관리형학습센터입니다.\n\n[${n}] 학생이 오늘 집중도가 다소 낮았습니다.\n사유: ${extraMap['att_reason']||'______'}\n\n가정에서도 한 말씀 부탁드립니다.`;
  }
  if (selectedMsgId==='hw_incomplete'||selectedMsgId==='hw_accumulate') {
    const items=[...Object.keys(hwChecked).filter(k=>hwChecked[k])];
    if(hwExtra) items.push(hwExtra);
    const itemStr=items.length?items.join(', '):'______';
    const verb=selectedMsgId==='hw_accumulate'?'누적 미완료':'미완료';
    return `안녕하세요, 이든관리형학습센터입니다.\n\n[${n}] 학생의 과제 ${verb} 항목을 안내드립니다.\n\n미완료 항목: ${itemStr}\n\n내일까지 완료할 수 있도록 확인 부탁드립니다.`;
  }
  if (selectedMsgId==='daily_multi') {
    const keys=Object.keys(dailyChecked);
    if(!keys.length) return '';
    const lines=keys.map(k=>{
      const d=DAILY_ITEMS.find(x=>x.key===k); const cur=dailyChecked[k]||{};
      let st=cur.status||'______';
      if(d?.hasNum&&cur.num) st=`${cur.num}강 학습`;
      return `${d?.icon||''} ${d?.title||k}: ${st}`;
    }).join('\n');
    return `안녕하세요, 이든관리형학습센터입니다.\n\n[${n}] 학생의 오늘 학습 현황을 안내드립니다.\n\n${lines}\n\n- 이든관리형학습센터 -`;
  }
  return msgs[selectedMsgId]||'';
}

// ─────────────────────────────────────────────────────────
// 미리보기
// ─────────────────────────────────────────────────────────
function renderPreview() {
  const el=document.getElementById('previewSection'); if(!el) return;
  const msg=buildMessage();
  if(!msg){el.innerHTML=''; document.getElementById('actionBar').style.display='none'; return;}
  const now=new Date().toLocaleString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  el.innerHTML=`<div class="preview-section">
    <div class="preview-label" style="margin-top:14px">메시지 미리보기</div>
    <div class="preview-bubble">${msg.replace(/\n/g,'<br>')}</div>
    <div class="preview-time">${now}</div>
  </div>`;
  document.getElementById('actionBar').style.display='flex';
}

// ─────────────────────────────────────────────────────────
// 복사 — execCommand 방식 (iframe 호환)
// ─────────────────────────────────────────────────────────
function doCopy() {
  const msg = buildMessage();
  if (!msg) { showToast('메시지 유형과 내용을 먼저 선택하세요'); return; }

  // 방법 1: 숨겨진 textarea + execCommand
  const ta = document.getElementById('copyTA');
  ta.value = msg;
  ta.style.position = 'fixed';
  ta.style.top = '0';
  ta.style.left = '0';
  ta.style.opacity = '0';
  ta.removeAttribute('readonly');
  ta.focus();
  ta.select();

  let success = false;
  try { success = document.execCommand('copy'); } catch(e) {}

  ta.setAttribute('readonly','');
  ta.style.top = '-9999px';
  ta.style.left = '-9999px';

  // 방법 2: clipboard API (지원 시)
  if (!success && navigator.clipboard) {
    navigator.clipboard.writeText(msg).then(()=>{
      onCopySuccess(msg);
    }).catch(()=>{ onCopyFail(); });
    return;
  }

  if (success) onCopySuccess(msg);
  else onCopyFail();
}

function onCopySuccess(msg) {
  addHistory(msg);
  const btn = document.getElementById('copyBtn');
  btn.textContent = '✅ 복사됐어요! 카카오톡에 붙여넣기 하세요';
  btn.classList.add('copied');
  showToast('✅ 복사 완료! 카카오톡을 열어 붙여넣기 하세요.', 3000);
  setTimeout(()=>{btn.textContent='📋 메시지 복사하기'; btn.classList.remove('copied');}, 3000);
}
function onCopyFail() {
  // 마지막 수단: 미리보기 버블을 직접 선택 안내
  showToast('📌 위 노란 메시지를 길게 눌러 복사하세요', 4000);
  const bubble = document.querySelector('.preview-bubble');
  if (bubble) {
    bubble.style.userSelect='all';
    const range=document.createRange(); range.selectNodeContents(bubble);
    const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(range);
  }
}

// ─────────────────────────────────────────────────────────
// 히스토리
// ─────────────────────────────────────────────────────────
function addHistory(msg) {
  historyLog.unshift({
    student: selectedStudent.name, grade: selectedStudent.grade, msg,
    time: new Date().toLocaleString('ko-KR',{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'})
  });
  if(historyLog.length>30) historyLog.pop();
  renderHistory();
}
function renderHistory() {
  const el=document.getElementById('historyList');
  if(!historyLog.length){el.innerHTML='<div class="empty-state"><p style="font-size:11px;">내역 없음</p></div>'; return;}
  el.innerHTML=historyLog.map((h,i)=>`
    <div class="history-item" onclick="recopy(${i})">
      <div class="history-student">${h.student} <span style="color:#ccc;font-size:10px;font-weight:400">${h.grade}</span></div>
      <div class="history-msg">${h.msg.replace(/\n/g,' ')}</div>
      <div class="history-ts">${h.time}</div>
      <div class="history-recopy">탭하면 다시 복사</div>
    </div>`).join('');
}
function recopy(i) {
  const ta=document.getElementById('copyTA');
  ta.value=historyLog[i].msg; ta.style.position='fixed'; ta.style.top='0'; ta.style.left='0'; ta.style.opacity='0';
  ta.removeAttribute('readonly'); ta.focus(); ta.select();
  let ok=false; try{ok=document.execCommand('copy');}catch(e){}
  ta.setAttribute('readonly',''); ta.style.top='-9999px'; ta.style.left='-9999px';
  if(!ok&&navigator.clipboard) navigator.clipboard.writeText(historyLog[i].msg).catch(()=>{});
  showToast('✅ 이전 메시지 다시 복사했습니다');
}
function clearHistory(){historyLog=[];renderHistory();}

function showToast(msg,dur=2500){
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

// ─────────────────────────────────────────────────────────
// 초기화
// ─────────────────────────────────────────────────────────
loadStudents();
renderHistory();
</script>
